name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Obtener SHA corto
        shell : bash
        run: |
          echo "COMMIT_ID=${GITHUB_SHA::6}" >> "$GITHUB_ENV"
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: stivenparada/python-app:${{ env.COMMIT_ID }}
    outputs: 
      commit_id: ${{ env.COMMIT_ID }}
  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      -
        uses: actions/checkout@v3
      -
        name: modificar values file
        shell: bash
        run: |
          echo ${{ needs.ci.outputs.commit_id }}
          sed -i "s|@@version@@|${{ needs.ci.outputs.commit_id }}|g" charts/python-app/values.yaml
      -
        name: commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Updates values.yaml with commit ${{ needs.ci.outputs.commit_id }}'
      -
        name: Install argocd
        shell: bash
        run: |
          curl -ksSl -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/bin/argocd
          ls -la /usr/bin/
      -
        name: argocd app sync
        shell: bash
        run: | 
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }}
          argocd app sync python-app
        